<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f2ef;
      color: #333;
      padding: 16px;
    }

    h1 {
      font-size: 16px;
      color: #0a66c2;
      margin-bottom: 8px;
      text-align: center;
    }

    p.info {
      font-size: 11px;
      color: #666;
      text-align: center;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 8px;
    }

    #btn-scrape {
      background: #0a66c2;
      color: #fff;
    }
    #btn-scrape:hover { background: #004182; }

    #btn-diagnostics {
      background: #fff;
      color: #0a66c2;
      border: 2px solid #0a66c2;
      font-size: 12px;
      padding: 8px;
    }
    #btn-diagnostics:hover { background: #e8f0fe; }

    .btn:disabled { background: #999; color: #fff; border-color: #999; cursor: not-allowed; }

    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      line-height: 1.4;
    }

    .status-ok { color: #057642; }
    .status-err { color: #cc1016; }
    .status-loading { color: #0a66c2; }

    #report {
      margin-top: 12px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      font-size: 10px;
      font-family: monospace;
      max-height: 200px;
      overflow-y: auto;
      display: none;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>LI Post Collector</h1>
  <p class="info">
    Navigate to your LinkedIn activity page, then click to extract visible posts.<br>
    If it doesn't work, use "Diagnostics" and check the console output (F12).
  </p>
  <button class="btn" id="btn-scrape">Extract my posts</button>
  <button class="btn" id="btn-diagnostics">Diagnostics</button>
  <div id="status"></div>
  <div id="report"></div>
  <script src="popup.js"></script>
</body>
</html>
